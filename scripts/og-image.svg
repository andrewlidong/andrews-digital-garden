<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4F9FF" />
      <stop offset="1" stop-color="#E3EEFF" />
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#42A5F5" />
      <stop offset="1" stop-color="#2979FF" />
    </linearGradient>
    <g id="paw" fill="#ffffff">
      <ellipse cx="32" cy="44" rx="15" ry="13" />
      <ellipse cx="15" cy="20" rx="7.5" ry="9.5" />
      <ellipse cx="27" cy="13" rx="7.5" ry="9.5" />
      <ellipse cx="40" cy="13" rx="7.5" ry="9.5" transform="rotate(-5 40 13)" />
      <ellipse cx="51" cy="20" rx="7.5" ry="9.5" transform="rotate(-10 51 20)" />
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Scattered confetti paws -->
  <use href="#paw" transform="translate(1010 70) rotate(18) scale(1.6)" fill="#E91E63" opacity="0.18" />
  <use href="#paw" transform="translate(1090 360) rotate(-12) scale(2.0)" fill="#4CAF50" opacity="0.16" />
  <use href="#paw" transform="translate(940 470) rotate(25) scale(1.3)" fill="#FF9800" opacity="0.18" />
  <use href="#paw" transform="translate(140 480) rotate(-20) scale(1.2)" fill="#9C27B0" opacity="0.16" />
  <use href="#paw" transform="translate(60 90) rotate(14) scale(1.0)" fill="#00BCD4" opacity="0.18" />

  <!-- Brand tile with paw -->
  <g transform="translate(110 195)">
    <rect width="240" height="240" rx="56" fill="url(#tile)" />
    <use href="#paw" transform="translate(120 124) scale(2.5) translate(-32 -30)" />
  </g>

  <!-- Text -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="404" y="278" font-size="84" font-weight="800" fill="#16203A">Andrew Dong</text>
    <text x="406" y="356" font-size="58" font-weight="700" fill="#2979FF">Digital Garden</text>
    <text x="406" y="416" font-size="30" font-weight="500" fill="#5A6478">Projects, interests &amp; creative explorations</text>
    <g transform="translate(406 452)">
      <rect width="284" height="52" rx="26" fill="#16203A" />
      <text x="142" y="34" font-size="26" font-weight="600" fill="#ffffff" text-anchor="middle">andrewlidong.xyz</text>
    </g>
  </g>
</svg>
